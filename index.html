<!DOCTYPE html>
<html lang="ja" class="dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Prason (Narcissus-tazetta) のポートフォリオ。music-autoplay をはじめとする作品を掲載しています。"
        />
        <title>Prasonのポートフォリオ — Narcissus-tazetta</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Ephesis&family=Kiwi+Maru&family=Orbitron:wght@400..900&display=swap"
        />
        <link rel="icon" href="%BASE_URL%icons.svg" type="image/svg+xml" />
        <script>
            (function () {
                var storageKey = "portfolio-theme";
                var stored = localStorage.getItem(storageKey);
                var theme = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
                var resolved =
                    theme === "system"
                        ? window.matchMedia("(prefers-color-scheme: dark)").matches
                            ? "dark"
                            : "light"
                        : theme;
                document.documentElement.classList.remove("light", "dark");
                document.documentElement.classList.add(resolved);
                if (localStorage.getItem("portfolio-accent-purple") === "1") {
                    document.documentElement.classList.add("accent-purple");
                }
            })();
        </script>
        <style>
            #initial-loader {
                position: fixed;
                inset: 0;
                z-index: 9999;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 0 1.5rem;
                opacity: 1;
                visibility: visible;
                transition: opacity 0.35s ease, visibility 0.35s ease;
            }

            #initial-loader.initial-loader--hidden {
                opacity: 0;
                visibility: hidden;
                pointer-events: none;
            }

            html.dark #initial-loader {
                background: #222;
            }

            html.light #initial-loader {
                background: #c4c4c4;
            }

            .initial-loader__content {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
                width: min(22rem, calc(100vw - 3rem));
            }

            .initial-loader__row {
                display: flex;
                align-items: center;
                gap: 1rem;
                width: 100%;
            }

            .initial-loader__track {
                position: relative;
                flex: 1;
                height: 4px;
                overflow: hidden;
                border-radius: 9999px;
                background: rgb(56 189 248 / 0.2);
            }

            html.light .initial-loader__track {
                background: rgb(2 132 199 / 0.2);
            }

            .initial-loader__bar {
                height: 100%;
                width: 0%;
                border-radius: 9999px;
                background: #7dd3fc;
                transition: width 0.12s ease-out;
            }

            html.light .initial-loader__bar {
                background: #0369a1;
            }

            .initial-loader__percent {
                min-width: 3.25rem;
                font-family: "Orbitron", ui-sans-serif, system-ui, sans-serif;
                font-size: 0.75rem;
                letter-spacing: 0.15em;
                text-align: right;
                color: #7dd3fc;
            }

            html.light .initial-loader__percent {
                color: #0369a1;
            }

            .initial-loader__label {
                margin: 0;
                font-family: "Orbitron", ui-sans-serif, system-ui, sans-serif;
                font-size: 0.65rem;
                letter-spacing: 0.28em;
                text-align: center;
                text-transform: uppercase;
                color: #7dd3fc;
            }

            html.light .initial-loader__label {
                color: #0369a1;
            }

            html.dark.accent-purple .initial-loader__track,
            html.light.accent-purple .initial-loader__track {
                background: rgb(131 67 210 / 0.2);
            }

            html.dark.accent-purple .initial-loader__bar,
            html.dark.accent-purple .initial-loader__percent,
            html.dark.accent-purple .initial-loader__label {
                color: #b593ef;
            }

            html.dark.accent-purple .initial-loader__bar {
                background: #8343d2;
            }

            html.light.accent-purple .initial-loader__bar,
            html.light.accent-purple .initial-loader__percent,
            html.light.accent-purple .initial-loader__label {
                color: #6432aa;
            }

            html.light.accent-purple .initial-loader__bar {
                background: #8343d2;
            }

            .initial-loader__dots {
                margin-left: 0.65em;
            }

            .initial-loader__dots span {
                display: inline-block;
                opacity: 0.45;
            }

            #initial-loader.initial-loader--wave .initial-loader__dots span {
                animation: initial-loader-dot-wave 1.15s ease-in-out infinite;
            }

            #initial-loader.initial-loader--wave .initial-loader__dots span:nth-child(2) {
                animation-delay: 0.16s;
            }

            #initial-loader.initial-loader--wave .initial-loader__dots span:nth-child(3) {
                animation-delay: 0.32s;
            }

            @keyframes initial-loader-dot-wave {
                0%,
                55%,
                100% {
                    transform: translateY(0);
                    opacity: 0.35;
                }

                28% {
                    transform: translateY(-0.45em);
                    opacity: 1;
                }
            }
        </style>
    </head>
    <body>
        <div
            id="initial-loader"
            role="progressbar"
            aria-live="polite"
            aria-busy="true"
            aria-label="Loading"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
        >
            <div class="initial-loader__content">
                <div class="initial-loader__row">
                    <div class="initial-loader__track">
                        <div id="initial-loader-bar" class="initial-loader__bar"></div>
                    </div>
                    <span id="initial-loader-percent" class="initial-loader__percent">0%</span>
                </div>
                <p class="initial-loader__label">
                    Loading<span class="initial-loader__dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span></span>
                </p>
            </div>
        </div>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
