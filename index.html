<!DOCTYPE html>
<html lang="ja" class="dark">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Prason (Narcissus-tazetta) のポートフォリオ。music-autoplay をはじめとする作品を掲載しています。"
        />
        <title>Prasonのポートフォリオ — Narcissus-tazetta</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Ephesis&family=Kiwi+Maru&family=Orbitron:wght@400..900&display=swap"
        />
        <link rel="icon" href="%BASE_URL%icons.svg" type="image/svg+xml" />
        <script>
            (function () {
                var storageKey = "portfolio-theme";
                var stored = localStorage.getItem(storageKey);
                var theme = stored === "light" || stored === "dark" || stored === "system" ? stored : "system";
                var resolved =
                    theme === "system"
                        ? window.matchMedia("(prefers-color-scheme: dark)").matches
                            ? "dark"
                            : "light"
                        : theme;
                document.documentElement.classList.remove("light", "dark");
                document.documentElement.classList.add(resolved);
            })();
        </script>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
